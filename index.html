<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VinFast - Báo giá</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 text-slate-900">
    <main class="mx-auto max-w-5xl p-3 sm:p-6">
      <section class="rounded-2xl bg-white p-4 sm:p-8 shadow-[0_10px_30px_rgba(0,0,0,0.15)]">
        <div
          class="-mt-4 -mx-4 sm:-mt-8 sm:-mx-8 rounded-t-2xl border-t-[10px] sm:border-t-[12px] border-[#00529b] p-4 sm:p-8 pb-4 sm:pb-6"
        >
          <div class="text-center">
            <h1 class="text-xl sm:text-2xl font-bold tracking-tight text-[#00529b]">
              VINFAST CARON GIA LÂM - HÀ NỘI
            </h1>
          </div>

          <p
            class="mt-3 text-sm text-slate-700 flex flex-col items-center gap-1 sm:flex-row sm:flex-wrap sm:justify-center sm:gap-x-2 sm:gap-y-1"
          >
            <span>
              <span class="font-semibold text-slate-900">Tư vấn viên:</span>
              NGUYỄN VĂN PHÚC
            </span>
            <span class="hidden sm:inline text-slate-400">|</span>
            <span>
              <span class="font-semibold text-slate-900">SĐT:</span>
              09.838.07.838
            </span>
          </p>
        </div>

        <div class="space-y-8">
          <section>
            <h2 class="text-lg font-semibold text-[#00529b]">Cấu hình báo giá</h2>

            <div class="mt-4 grid grid-cols-1 gap-4 md:grid-cols-3">
              <label class="block">
                <span class="text-sm font-medium text-slate-700">Chọn mẫu xe</span>
                <select
                  id="carSelect"
                  class="mt-1 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm focus:border-[#00529b] focus:outline-none focus:ring-2 focus:ring-[#00529b]/20"
                ></select>
              </label>

              <fieldset class="block">
                <legend class="text-sm font-medium text-slate-700">% ưu đãi</legend>
                <div class="mt-2 flex flex-wrap gap-2">
                  <label
                    class="inline-flex items-center gap-2 rounded-full border border-slate-300 bg-white px-3 py-1.5 text-sm text-slate-800 shadow-sm"
                  >
                    <input
                      type="checkbox"
                      name="discountPercents"
                      value="3"
                      class="h-4 w-4 rounded border-slate-300 text-[#00529b] focus:ring-[#00529b]/20"
                    />
                    3%
                  </label>
                  <label
                    class="inline-flex items-center gap-2 rounded-full border border-slate-300 bg-white px-3 py-1.5 text-sm text-slate-800 shadow-sm"
                  >
                    <input
                      type="checkbox"
                      name="discountPercents"
                      value="5"
                      class="h-4 w-4 rounded border-slate-300 text-[#00529b] focus:ring-[#00529b]/20"
                    />
                    5%
                  </label>
                  <label
                    class="inline-flex items-center gap-2 rounded-full border border-slate-300 bg-white px-3 py-1.5 text-sm text-slate-800 shadow-sm"
                  >
                    <input
                      type="checkbox"
                      name="discountPercents"
                      value="6"
                      class="h-4 w-4 rounded border-slate-300 text-[#00529b] focus:ring-[#00529b]/20"
                    />
                    6%
                  </label>
                  <label
                    class="inline-flex items-center gap-2 rounded-full border border-slate-300 bg-white px-3 py-1.5 text-sm text-slate-800 shadow-sm"
                  >
                    <input
                      type="checkbox"
                      name="discountPercents"
                      value="10"
                      class="h-4 w-4 rounded border-slate-300 text-[#00529b] focus:ring-[#00529b]/20"
                    />
                    10%
                  </label>
                </div>
              </fieldset>

              <label class="block">
                <span class="text-sm font-medium text-slate-700">Giảm giá (triệu đồng)</span>
                <input
                  id="discountMillion"
                  type="number"
                  min="0"
                  step="1"
                  value="0"
                  class="mt-1 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm focus:border-[#00529b] focus:outline-none focus:ring-2 focus:ring-[#00529b]/20"
                />
              </label>
            </div>

            <div class="mt-4 grid grid-cols-1 gap-4 md:grid-cols-3">
              <label class="flex items-center gap-2">
                <input
                  id="loanEnabled"
                  type="checkbox"
                  class="h-4 w-4 rounded border-slate-300 text-[#00529b] focus:ring-[#00529b]/20"
                />
                <span class="text-sm font-medium text-slate-700">Tính trả góp</span>
              </label>

              <label class="block">
                <span class="text-sm font-medium text-slate-700">Số tháng vay</span>
                <input
                  id="loanMonths"
                  type="number"
                  min="1"
                  step="1"
                  value="24"
                  class="mt-1 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm focus:border-[#00529b] focus:outline-none focus:ring-2 focus:ring-[#00529b]/20"
                />
              </label>

              <label class="block">
                <span class="text-sm font-medium text-slate-700">% Trả trước</span>
                <input
                  id="prepayPercent"
                  type="number"
                  min="0"
                  max="100"
                  step="1"
                  value="20"
                  class="mt-1 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm focus:border-[#00529b] focus:outline-none focus:ring-2 focus:ring-[#00529b]/20"
                />
              </label>
            </div>

            <div class="mt-4 grid grid-cols-1 gap-4 md:grid-cols-3">
              <label class="block md:col-span-1">
                <span class="text-sm font-medium text-slate-700">Lãi suất (%/năm)</span>
                <input
                  id="interestRate"
                  type="number"
                  min="0"
                  step="0.1"
                  value="8.0"
                  class="mt-1 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm focus:border-[#00529b] focus:outline-none focus:ring-2 focus:ring-[#00529b]/20"
                />
              </label>

              <div class="md:col-span-2 flex items-end gap-3">
                <button
                  id="calcBtn"
                  type="button"
                  class="inline-flex items-center justify-center rounded-lg bg-[#00529b] px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-[#00457f] focus:outline-none focus:ring-2 focus:ring-[#00529b]/30"
                >
                  Tính / Cập nhật
                </button>
                <p id="status" class="text-sm text-slate-600"></p>
              </div>
            </div>
          </section>

          <section>
            <h2 class="text-lg font-semibold text-[#00529b]">THÔNG TIN BÁO GIÁ XE</h2>

            <div class="mt-4 rounded-xl border border-slate-200 bg-white">
              <div class="divide-y divide-slate-200">
                <div class="grid grid-cols-1 gap-2 px-4 py-3 sm:grid-cols-3 sm:items-center">
                  <div class="text-left text-sm font-medium text-slate-700">Mẫu xe</div>
                  <div
                    id="qModel"
                    class="sm:col-span-2 text-right sm:text-left text-sm font-semibold text-slate-900 break-words"
                  ></div>
                </div>

                <div class="grid grid-cols-2 gap-2 px-4 py-3 sm:grid-cols-3 sm:items-center">
                  <div class="text-left text-sm font-medium text-slate-700">Giá niêm yết</div>
                  <div
                    id="qListPrice"
                    class="sm:col-span-2 text-right text-sm text-slate-900 tabular-nums"
                  ></div>
                </div>

                <div class="grid grid-cols-2 gap-2 px-4 py-3 sm:grid-cols-3 sm:items-center">
                  <div class="text-left text-sm font-medium text-slate-700">Ưu đãi giảm giá</div>
                  <div
                    id="qDiscount"
                    class="sm:col-span-2 text-right text-sm font-medium text-emerald-700 tabular-nums"
                  ></div>
                </div>

                <div class="grid grid-cols-1 gap-2 px-4 py-3 sm:grid-cols-3 sm:items-center">
                  <div class="text-left text-sm font-semibold text-slate-900">GIÁ XE SAU GIẢM</div>
                  <div
                    id="qFinalPrice"
                    class="sm:col-span-2 text-right text-xl sm:text-2xl font-bold text-rose-600 tabular-nums"
                  ></div>
                </div>

                <div class="grid grid-cols-1 gap-2 px-4 py-3 sm:grid-cols-3 sm:items-center">
                  <div class="text-left text-sm font-semibold text-slate-900">LĂN BÁNH TẠM TÍNH</div>
                  <div
                    id="qOnRoad"
                    class="sm:col-span-2 text-right text-base sm:text-lg font-bold text-[#00529b] tabular-nums"
                  ></div>
                </div>
              </div>
            </div>

            <div
              id="qGift"
              class="mt-4 rounded-xl border border-sky-300 bg-sky-50 px-4 py-3 text-sm text-[#00529b]"
            ></div>
          </section>

          <section id="loanSection" class="hidden">
            <h2 class="text-lg font-semibold text-[#00529b]">
              DỰ TOÁN TRẢ GÓP CHI TIẾT
            </h2>
            <p id="loanSummary" class="mt-2 text-sm text-slate-700"></p>

            <div
              class="mt-4 max-h-[420px] overflow-auto rounded-xl border border-slate-200 bg-white"
            >
              <div class="min-w-[720px]">
                <table class="w-full text-sm">
                <thead class="sticky top-0 bg-slate-50">
                  <tr class="text-slate-700">
                    <th class="border-b border-slate-200 px-3 py-2 text-center font-semibold">
                      Tháng
                    </th>
                    <th class="border-b border-slate-200 px-3 py-2 text-right font-semibold">
                      Dư nợ gốc
                    </th>
                    <th class="border-b border-slate-200 px-3 py-2 text-right font-semibold">
                      Tiền Gốc
                    </th>
                    <th class="border-b border-slate-200 px-3 py-2 text-right font-semibold">
                      Tiền Lãi
                    </th>
                    <th class="border-b border-slate-200 px-3 py-2 text-right font-semibold">
                      Tổng Trả
                    </th>
                  </tr>
                </thead>
                <tbody id="loanTableBody" class="divide-y divide-slate-200 bg-white"></tbody>
                </table>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
